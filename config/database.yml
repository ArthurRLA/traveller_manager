default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: traveller_user
  password: traveller_postgres
  host: localhost

development:
  <<: *default
  database: traveller_manager_development

test:
  <<: *default
  database: traveller_manager_test

production:
  <<: *default
  database: traveller_manager_production
  username: traveller_user
  password: <%= ENV["DATABASE_PASSWORD"] %>